<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
           /* min-height: 750px; */
            background-color: #8BC6EC;
            background-image: linear-gradient(135deg, #69a6dcc6 0% #9599E2 100% );
            display: flex;
            justify-content: center;
           align-items: center;

        }
        .card{
            padding: 16px;
            width: 320px;
            height: 500px;
            background-color: white;
            border-radius: 20px;
            align-items: center;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .card img{
            height: 59%;
            width: 290px;
        }
        .header{
            color: rgb(17, 19, 21);
            font-size: 14px;
            align-content: center;
            justify-content: center;
            font-weight: bold;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="qr-code.jpg" alt="">
            <div class="header">
                <b><u><h1>"Improve yourWebDev Skills with me"</h1></u></b>
            </div>
            <div class="para">
                <p>"Scan the QR code To get The roadmap for Full Stack Web Development course and for making real world Projects"</p>
            </div>
        </div>
        
    </div>
</body>
</html>
